# EEG CLIP Training Configuration
# Train an EEG encoder via symmetric InfoNCE against V-JEPA-2 frame embeddings.
# No masking, no predictor, no anti-collapse — the CLIP objective is the only loss.

meta:
  seed: 2025
  device: auto  # auto, cuda, or cpu
  # Path to a JEPA checkpoint (or any model with `encoder.*` state-dict keys).
  # When set, only encoder weights are copied; optimizer / LR / step start fresh.
  encoder_init_from: null

data:
  batch_size: 64
  num_workers: 4
  task: ThePresent
  n_windows: 1
  window_size_seconds: 2
  temporal_stride: 1
  preprocessed: true
  preprocessed_dir: null
  norm_mode: per_recording
  add_envelope: false
  corrca_filters: null
  annotation_duration_tolerance_s: 1.0
  max_recording_overshoot_s: 60.0

model:
  # REVE encoder — same fields as jepa_pretrain.yaml so a JEPA checkpoint loads
  # cleanly via encoder_init_from. Predictor / masking blocks are intentionally
  # absent since the CLIP path doesn't use them.
  encoder_embed_dim: 64
  encoder_depth: 4
  encoder_heads: 4
  encoder_head_dim: 16
  patch_size: 50
  patch_overlap: 20
  freqs: 4
  mlp_dim_ratio: 2.66

loss:
  proj_dim: 256        # shared EEG↔vision projection space
  temperature: 0.07    # initial logit-scale value (learnable)

optim:
  epochs: 50
  lr: 3.0e-4
  lr_min: 1.0e-6
  warmup_epochs: 5

logging:
  log_wandb: true
  wandb_group:
  log_every: 1
  save_every: 10
  tqdm_silent: false

# Post-training auto-eval (probe_eval + bootstrap). Disabled by default for CLIP
# since the probe-eval pipeline is JEPA-shaped; flip to true if you've validated
# that path against a CLIP checkpoint.
eval:
  auto_run: false
  n_passes: 20
  probe_seed: 42
  n_bootstrap: 2000
  feature_names:
    - contrast_rms
    - luminance_mean
    - position_in_movie
    - narrative_event_score
  visual_processing_delay_s: 0.0
