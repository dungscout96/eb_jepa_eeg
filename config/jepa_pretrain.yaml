# EEG JEPA Training Configuration
# Train a self-supervised EEG prediction model with movie feature evaluation decoders

meta:
  seed: 2025
  device: auto  # auto, cuda, or cpu

data:
  batch_size: 64
  num_workers: 4
  task: ThePresent #[ThePresent, DespicableMe]  # str or list; recordings from all tasks are combined
  n_windows: 4          # Number of windows per sample
  window_size_seconds: 2  # Window duration in seconds
  temporal_stride: 1      # Stride between sampled windows (1=contiguous, 4=8s apart)
  preprocessed: true     # Use preprocessed data (set true + preprocessed_dir to use)
  preprocessed_dir: null  # Auto-detects known paths; set explicitly to override
  norm_mode: global       # "global" = dataset-wide mean/std; "per_recording" = removes subject fingerprint
  add_envelope: false     # Append 1-8 Hz analytic envelope as extra channels (doubles n_chans)
  corrca_filters: null    # null | str path (shared across tasks) | {task: path} for per-movie filters
                          # e.g. {ThePresent: corrca_filters_ThePresent.npz, DespicableMe: corrca_filters_DespicableMe.npz}
  # HBN dataset parameters
  annotation_duration_tolerance_s: 1.0
  max_recording_overshoot_s: 60.0

model:
  # REVE encoder architecture (n_chans auto-detected from data)
  encoder_embed_dim: 64
  encoder_depth: 4
  encoder_heads: 4
  encoder_head_dim: 16

  # Masked prediction (V-JEPA style)
  patch_size: 50         # Temporal patch size in samples
  patch_overlap: 20      # Overlap between patches
  freqs: 4               # Fourier positional encoding frequencies
  mlp_dim_ratio: 2.66   # FFN hidden dim = embed_dim * mlp_dim_ratio
  predictor_depth: 2     # Transformer depth for predictor (shallower than encoder)
  predictor_embed_dim: null  # Predictor bottleneck dim (null = same as encoder_embed_dim)

masking:
  n_pred_masks_short: 2             # Number of short-range prediction masks
  n_pred_masks_long: 2              # Number of long-range prediction masks
  short_channel_scale: [0.08, 0.15] # Fraction of channels per short mask
  short_patch_scale: [0.3, 0.6]     # Fraction of patches per short mask
  long_channel_scale: [0.15, 0.35]  # Fraction of channels per long mask
  long_patch_scale: [0.5, 1.0]      # Fraction of patches per long mask
  min_context_fraction: 0.15        # Minimum fraction of tokens as context

loss:
  # Anti-collapse strategy. Each is wired to its canonical paper:
  #   "dino"   — EMA target encoder (V-JEPA / DINO).
  #   "vicreg" — variance/covariance loss on context tokens (VICReg).
  #   "sigreg" — sketched Gaussianity test on pooled embeddings (LeJEPA).
  #   "none"   — no anti-collapse (representations will collapse; for ablations).
  anti_collapse: vicreg
  # DINO settings (only used when anti_collapse=dino).
  # Cosine EMA momentum schedule for the target encoder.
  dino:
    ema_momentum: 0.996
    ema_momentum_end: 1.0
  # VICReg settings (only used when anti_collapse=vicreg)
  vicreg:
    std_coeff: 1.0      # Standard deviation (variance hinge) loss weight
    cov_coeff: 1.0      # Covariance loss weight
    use_projector: true # Wrap VICReg with a Projector MLP
  # SIGReg settings (only used when anti_collapse=sigreg).
  # Total loss = (1 - coeff) * pred_loss + coeff * sigreg.
  sigreg:
    num_slices: 1024   # Number of random projection directions (paper default)
    coeff: 0.05        # λ — convex weight on SIGReg vs pred_loss (paper default)
    ep_t_range: 5.0    # Epps-Pulley integration domain [-ep_t_range, ep_t_range]
    ep_n_points: 17    # Epps-Pulley quadrature points
  pred_loss_type: mse  # Prediction loss: "mse" or "smooth_l1" (Huber, used in V-JEPA)

optim:
  epochs: 100
  lr: 3.0e-4
  lr_min: 1.0e-6       # Cosine LR schedule minimum (set to 0 to disable schedule)
  warmup_epochs: 5     # Linear warmup epochs before cosine decay

logging:
  log_wandb: true
  wandb_group:        # Set to group runs
  log_every: 1        # Log every N epochs
  save_every: 10      # Save checkpoint every N epochs
  tqdm_silent: false  # Disable tqdm progress bars

# Post-training auto-eval. When auto_run is true (default), the training
# entry point invokes eb_jepa.evaluation.run_probe_eval on the saved
# checkpoint, then eb_jepa.evaluation.bootstrap_predictions on the dumped
# predictions. Disable for fast smoke runs or when a sweep launcher will
# submit eval as its own job.
eval:
  auto_run: true
  n_passes: 20              # Per-clip augmentation passes per recording
  probe_seed: 42            # Probe RNG seed (fix across encoder seeds)
  n_bootstrap: 2000         # Recording-level bootstrap resamples
  wandb_group: probe_eval_auto
  # Movie feature columns the post-training probes target.
  feature_names:
    - contrast_rms
    - luminance_mean
    - position_in_movie
    - narrative_event_score
  # EEG window at time t is paired with the movie frame at time
  # t - visual_processing_delay_s. Windows whose paired frame falls
  # outside the movie are discarded (no clamping). Sweepable.
  visual_processing_delay_s: 0.0
