data:
  annotation_duration_tolerance_s: 1.0 # tolerance for difference in eeg movie recording and actual movie duration, to account for event imprecision
  max_recording_overshoot_s: 60.0
  # EEG window at time t is paired with the movie frame at time
  # t - visual_processing_delay_s. Windows whose paired frame falls
  # outside the movie are discarded (no clamping).
  visual_processing_delay_s: 0.0

benchmark:
  task_mode: binary  # regression, binary, tertile

trainer:
  n_epochs: 50
  patience: 7
  batch_size: 32
  weight_decay: 1e-4
  grad_clip_norm: 1.0