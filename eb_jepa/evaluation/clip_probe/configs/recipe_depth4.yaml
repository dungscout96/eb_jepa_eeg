# Encoder shape for the recipe runs that use the default encoder_depth=4:
# - baseline (wandb gpjzz1kt, Delta job 19635706)
# - lr=1e-3 variant (wandb 0rfdranz, Delta job 19637703)
# - target_kind=per_window variant (wandb bj4jp8qn, Delta job 19637809)
#
# Mirrors config/clip_pretrain.yaml at commit 749613d. Only model.* and data.*
# are used by experiments/clip_probe/probe.py — loss/optim/logging are ignored.

meta:
  seed: 2025
  device: auto

data:
  batch_size: 64
  num_workers: 4
  task: ThePresent
  n_windows: 1
  window_size_seconds: 2
  temporal_stride: 1
  preprocessed: true
  preprocessed_dir: null
  norm_mode: per_recording
  add_envelope: false
  corrca_filters: null
  annotation_duration_tolerance_s: 1.0
  max_recording_overshoot_s: 60.0

model:
  encoder_embed_dim: 1024
  encoder_depth: 4
  encoder_heads: 4
  encoder_head_dim: 16
  patch_size: 50
  patch_overlap: 20
  freqs: 6
  mlp_dim_ratio: 2.66
